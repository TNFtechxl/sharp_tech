<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sharp Tech — Home</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#060612;
  --accent:#00e5ff;
  --accent2:#a855f7;
  --muted:#a1a1aa;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Inter;
  background:var(--bg);
  color:#fff;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  inset:-30%;
  z-index:-2;
  background:
    radial-gradient(circle at 20% 20%, rgba(0,229,255,0.8), transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(168,85,247,0.8), transparent 40%);
  filter:blur(120px);
}

/* ===== MOUSE GLOW ===== */
.glow{
  position:fixed;
  width:220px;
  height:220px;
  border-radius:50%;
  pointer-events:none;
  background:radial-gradient(circle, rgba(0,229,255,0.25), transparent 70%);
  filter:blur(40px);
  z-index:-1;
}

header{
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(10px);
}

.logo{
  font-weight:800;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

nav a{
  margin-left:20px;
  text-decoration:none;
  color:var(--muted);
}

nav a:hover{color:#fff}

.hero{
  text-align:center;
  padding:120px 20px;
}

.hero h1{
  font-size:45px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

section{
  max-width:1000px;
  margin:auto;
  padding:60px 20px;
}

.card{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:12px;
  margin:15px 0;
  border:1px solid rgba(255,255,255,0.08);
}

footer{
  text-align:center;
  padding:30px;
  color:#777;
}
</style>
</head>

<body>

<div class="glow" id="glow"></div>

<header>
  <div class="logo">⚡Sharp Tech</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="courses.html">Courses</a>
    <a href="pricings.html">Pricing</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<div class="hero">
  <h1>Learn Skills That Make Money</h1>
</div>

<section>
  <div class="card">🔥 High Income Skills</div>
  <div class="card">⚡ Learn & Earn Online</div>
  <div class="card">💰 Build Real Income</div>
</section>

<footer>© 2026 Sharp Tech</footer>

<script>
const glow=document.getElementById("glow");
document.addEventListener("mousemove",(e)=>{
  glow.style.left=(e.clientX-110)+"px";
  glow.style.top=(e.clientY-110)+"px";
});
</script>

</body>
</html>
