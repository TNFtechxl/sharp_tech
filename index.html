<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sharp Tech — Home</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#060612;
  --accent:#00e5ff;
  --accent2:#a855f7;
  --muted:#a1a1aa;
}

/* RESET */
*{margin:0;padding:0;box-sizing:border-box}

html{
  font-size:16px;
}

@media (max-width:480px){
  html{font-size:14px;}
}

body{
  font-family:Inter, sans-serif;
  background:var(--bg);
  color:#fff;
  overflow-x:hidden;
}

/* 🌈 PAINT GLOW BACKGROUND */
body::before{
  content:"";
  position:fixed;
  inset:-50%;
  z-index:-3;
  background:
    radial-gradient(circle at 20% 30%, rgba(0,255,255,0.9), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(168,85,247,0.9), transparent 45%),
    radial-gradient(circle at 50% 50%, rgba(255,0,150,0.6), transparent 50%);
  filter:blur(140px) saturate(180%);
  animation:paintMove 12s ease-in-out infinite alternate;
}

@keyframes paintMove{
  0%{transform:translate(-60px,-40px) scale(1)}
  50%{transform:translate(80px,60px) scale(1.2)}
  100%{transform:translate(-40px,80px) scale(1.1)}
}

/* 🌟 CURSOR GLOW */
.glow{
  position:fixed;
  width:260px;
  height:260px;
  border-radius:50%;
  pointer-events:none;
  background:radial-gradient(circle, rgba(0,255,255,0.3), rgba(168,85,247,0.25), transparent 70%);
  filter:blur(50px);
  mix-blend-mode:screen;
  z-index:-1;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(12px);
  position:sticky;
  top:0;
  z-index:10;
}

.logo{
  font-weight:800;
  font-size:20px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* NAV */
nav{
  display:flex;
}

nav a{
  margin-left:20px;
  text-decoration:none;
  color:var(--muted);
  font-size:14px;
  transition:.3s;
}

nav a:hover{color:#fff}

/* MOBILE MENU */
.menu-btn{
  display:none;
  font-size:22px;
  cursor:pointer;
}

/* HERO */
.hero{
  text-align:center;
  padding:120px 20px 80px;
  max-width:1000px;
  margin:auto;
}

.hero h1{
  font-size:clamp(28px, 6vw, 70px);
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.hero p{
  color:var(--muted);
  margin-top:10px;
  font-size:clamp(14px,2vw,18px);
}

/* SECTION */
section{
  max-width:1100px;
  margin:auto;
  padding:60px 20px;
}

/* CARDS */
.card{
  width:100%;
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:14px;
  margin:15px 0;
  border:1px solid rgba(255,255,255,0.08);
  transition:.3s;
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 10px 30px rgba(0,255,255,0.15);
}

/* FOOTER */
footer{
  text-align:center;
  padding:30px;
  color:#777;
}

/* 📱 MOBILE */
@media (max-width:768px){

  header{
    flex-direction:row;
  }

  nav{
    position:absolute;
    top:70px;
    right:0;
    background:#060612;
    flex-direction:column;
    width:200px;
    display:none;
    padding:20px;
  }

  nav a{
    margin:10px 0;
  }

  nav.active{
    display:flex;
  }

  .menu-btn{
    display:block;
  }

  .hero{
    padding:80px 20px;
  }
}
</style>
</head>

<body>

<div class="glow" id="glow"></div>

<header>
  <div class="logo">⚡Sharp Tech</div>

  <div class="menu-btn" onclick="toggleMenu()">☰</div>

  <nav id="nav">
    <a href="index.html">Home</a>
    <a href="courses.html">Courses</a>
    <a href="pricing.html">Pricing</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<div class="hero">
  <h1>Learn Skills That Make Money</h1>
  <p>Affiliate Marketing • Coding • Video Editing • Automation</p>
</div>

<section>
  <div class="card">🔥 High Income Digital Skills</div>
  <div class="card">⚡ Learn From Beginner to Pro</div>
  <div class="card">💰 Build Real Online Income</div>
</section>

<footer>© 2026 Sharp Tech</footer>

<script>
/* mouse glow */
const glow=document.getElementById("glow");
document.addEventListener("mousemove",(e)=>{
  glow.style.left=(e.clientX-130)+"px";
  glow.style.top=(e.clientY-130)+"px";
});

/* mobile menu */
function toggleMenu(){
  document.getElementById("nav").classList.toggle("active");
}
</script>

</body>
</html>
